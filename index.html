<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nirob AI | Future of Chat</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');

        :root {
            --primary-gradient: linear-gradient(135deg, #1a73e8 0%, #6d28d9 100%);
            --ai-bubble: #f0f4f9;
            --user-bubble: #1a73e8;
            --bg-dark: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.8);
            --border-subtle: rgba(226, 232, 240, 0.8);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f8fafc;
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 20px 20px;
            height: 100dvh;
            display: flex; 
            justify-content: center;
        }
        
        #chat-container { 
            width: 100%; 
            max-width: 550px; 
            height: 100%;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            display: flex; 
            flex-direction: column; 
            position: relative;
        }

        @media (min-width: 600px) {
            #chat-container {
                height: 94vh;
                margin-top: 3vh;
                border-radius: 32px;
                border: 1px solid var(--border-subtle);
                box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            }
        }
        
        #header { 
            padding: 20px 24px; 
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.5);
            border-bottom: 1px solid var(--border-subtle);
            z-index: 10;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .ai-logo {
            width: 32px;
            height: 32px;
            background: var(--primary-gradient);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 14px;
        }

        .brand-name {
            font-weight: 700;
            font-size: 1.2rem;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #new-chat {
            padding: 8px 16px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            background: white;
            color: #475569;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        #new-chat:hover { background: #f1f5f9; transform: translateY(-1px); }

        #messages { 
            flex: 1; 
            padding: 24px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 24px;
        }
        
        .msg-wrapper { display: flex; flex-direction: column; width: 100%; }
        
        .message { 
            max-width: 85%; 
            padding: 14px 20px; 
            font-size: 0.98rem; 
            line-height: 1.6; 
            border-radius: 20px;
            position: relative;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .user { 
            align-self: flex-end; 
            background: var(--user-bubble); 
            color: white; 
            border-bottom-right-radius: 4px;
            box-shadow: 0 10px 15px -3px rgba(26, 115, 232, 0.3);
        }
        
        .ai { 
            align-self: flex-start; 
            background: var(--ai-bubble); 
            color: #1e293b; 
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(0,0,0,0.03);
        }

        .timestamp {
            font-size: 0.7rem;
            color: #94a3b8;
            margin-top: 6px;
            padding: 0 5px;
        }

        .user-wrapper .timestamp { align-self: flex-end; }
        
        #input-container {
            padding: 20px 24px 30px 24px;
            background: white;
        }

        .input-box { 
            display: flex; 
            gap: 12px; 
            align-items: flex-end;
            background: #f1f5f9;
            padding: 10px 10px 10px 18px;
            border-radius: 24px;
            border: 2px solid transparent;
            transition: 0.3s;
        }

        .input-box:focus-within {
            background: #fff;
            border-color: #1a73e8;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        
        textarea { 
            flex: 1; 
            border: none; 
            background: transparent;
            padding: 10px 0; 
            outline: none; 
            font-size: 16px; 
            font-family: inherit;
            resize: none;
            max-height: 180px;
            color: #1e293b;
        }
        
        #send-btn { 
            background: var(--primary-gradient); 
            color: white; 
            border: none; 
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer; 
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #send-btn:hover { transform: scale(1.1); }
        #send-btn:active { transform: scale(0.9); }

        .typing {
            display: flex;
            gap: 4px;
            padding: 15px 20px;
            background: var(--ai-bubble);
            border-radius: 20px;
            width: fit-content;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #cbd5e1;
            border-radius: 50%;
            animation: wave 1.3s linear infinite;
        }
        .dot:nth-child(2) { animation-delay: -1.1s; }
        .dot:nth-child(3) { animation-delay: -0.9s; }

        @keyframes wave {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); background: #1a73e8; }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="header">
        <div class="brand">
            <div class="ai-logo">N</div>
            <div class="brand-name">Nirob AI</div>
        </div>
        <button id="new-chat" onclick="clearChat()">New Chat</button>
    </div>
    
    <div id="messages">
        <div class="msg-wrapper">
            <div class="message ai">
                Hello! I am your advanced AI assistant. How can I help you today?
            </div>
            <div class="timestamp">Just now</div>
        </div>
    </div>

    <div id="input-container">
        <div class="input-box">
            <textarea id="userInput" placeholder="Message Nirob AI..." rows="1" oninput="resizer(this)"></textarea>
            <button id="send-btn" onclick="handleSend()">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
            </button>
        </div>
    </div>
</div>

<script>
    const API_KEY = "AIzaSyDN7bLKR8S6XYZAE9OvrIQMh9ZLRZOsoCw"; 
    const MODEL = "gemini-3.1-flash-lite"; 

    let history = [];
    // এখানে মালিকের নাম নিশ্চিত করার জন্য ইন্সট্রাকশন আপডেট করা হয়েছে
    const SYS_MSG = "You are a professional, helpful AI assistant. Your creator, developer, and owner is Nirob. If anyone asks about your origin, who made you, or who Nirob is, always state that Nirob is your creator. Use clear, modern formatting and be concise.";

    function resizer(el) {
        el.style.height = 'auto';
        el.style.height = el.scrollHeight + 'px';
    }

    function clearChat() {
        history = [];
        document.getElementById('messages').innerHTML = `
            <div class="msg-wrapper">
                <div class="message ai">History cleared. What's on your mind?</div>
            </div>`;
    }

    async function handleSend() {
        const input = document.getElementById('userInput');
        const msg = input.value.trim();
        if(!msg) return;

        append('user', msg);
        history.push({ role: "user", parts: [{ text: msg }] });
        
        input.value = '';
        input.style.height = 'auto';
        
        showTyping();

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    systemInstruction: { parts: [{ text: SYS_MSG }] },
                    contents: history 
                })
            });

            const data = await res.json();
            hideTyping();

            if(data.candidates) {
                const reply = data.candidates[0].content.parts[0].text;
                append('ai', reply);
                history.push({ role: "model", parts: [{ text: reply }] });
            }
        } catch (e) {
            hideTyping();
            append('ai', "I'm having trouble connecting. Check your internet.");
        }
    }

    function append(role, text) {
        const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const wrapper = document.createElement('div');
        wrapper.className = `msg-wrapper ${role}-wrapper`;
        wrapper.innerHTML = `
            <div class="message ${role}">${text}</div>
            <div class="timestamp">${time}</div>
        `;
        document.getElementById('messages').appendChild(wrapper);
        const box = document.getElementById('messages');
        box.scrollTop = box.scrollHeight;
    }

    function showTyping() {
        const div = document.createElement('div');
        div.id = 'loader';
        div.className = 'typing';
        div.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
        document.getElementById('messages').appendChild(div);
        document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
    }

    function hideTyping() {
        const el = document.getElementById('loader');
        if(el) el.remove();
    }

    // Support Enter Key
    document.getElementById('userInput').addEventListener('keydown', (e) => {
        if(e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            handleSend();
        }
    });
</script>

</body>
</html>
